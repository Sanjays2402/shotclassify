name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - run: pip install uv
      - run: |
          uv pip install --system -e ./packages/common -e ./packages/ocr -e ./packages/classify \
                                   -e ./packages/extract -e ./packages/route -e ./packages/store -e ./cli
          uv pip install --system pytest pytest-asyncio pillow pytesseract numpy opencv-python-headless \
                                   pyyaml structlog pydantic-settings sqlalchemy openai httpx \
                                   pygments langdetect typer rich rq redis fastapi itsdangerous authlib
      - run: pytest -q

  web:
    if: ${{ vars.ENABLE_CI == 'true' }}
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - run: npm run lint || true
      - run: npm run build
