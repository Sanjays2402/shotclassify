apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shotclassify.fullname" . }}-api
  labels: {{- include "shotclassify.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels: { app: shotclassify-api }
  template:
    metadata:
      labels: { app: shotclassify-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7441"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports: [{containerPort: 7441}]
          env:
            - { name: DATABASE_URL, value: "{{ .Values.postgres.url }}" }
            - { name: REDIS_URL,    value: "{{ .Values.redis.url }}" }
            {{- range $k, $v := .Values.env }}
            - { name: "{{ $k }}", value: "{{ $v }}" }
            {{- end }}
            - name: APP_SECRET_KEY
              valueFrom: { secretKeyRef: { name: {{ include "shotclassify.fullname" . }}-secret, key: app-secret-key } }
            - name: AUTH_API_KEY
              valueFrom: { secretKeyRef: { name: {{ include "shotclassify.fullname" . }}-secret, key: api-key } }
            {{- if .Values.secret.apiKeys }}
            - name: AUTH_API_KEYS
              valueFrom: { secretKeyRef: { name: {{ include "shotclassify.fullname" . }}-secret, key: api-keys } }
            {{- end }}
            {{- if .Values.secret.roleMap }}
            - name: AUTH_ROLE_MAP
              valueFrom: { secretKeyRef: { name: {{ include "shotclassify.fullname" . }}-secret, key: role-map } }
            {{- end }}
            {{- if .Values.sentry.enabled }}
            - name: SENTRY_DSN
              valueFrom: { secretKeyRef: { name: {{ include "shotclassify.fullname" . }}-secret, key: sentry-dsn } }
            - { name: SENTRY_RELEASE,                 value: "{{ .Values.sentry.release }}" }
            - { name: SENTRY_SAMPLE_RATE,             value: "{{ .Values.sentry.sampleRate }}" }
            - { name: SENTRY_TRACES_SAMPLE_RATE,      value: "{{ .Values.sentry.tracesSampleRate }}" }
            - { name: SENTRY_PROFILES_SAMPLE_RATE,    value: "{{ .Values.sentry.profilesSampleRate }}" }
            {{- end }}
          readinessProbe:
            httpGet: { path: /readyz, port: 7441 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 7441 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources: {{- toYaml .Values.resources.api | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shotclassify.fullname" . }}-api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "7441"
    prometheus.io/path: "/metrics"
spec:
  type: {{ .Values.service.api.type }}
  ports: [{port: {{ .Values.service.api.port }}, targetPort: 7441, name: http}]
  selector: { app: shotclassify-api }
